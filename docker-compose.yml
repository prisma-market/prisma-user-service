version: '3.8'

services:
  user-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    depends_on:
      - mongodb
    restart: always
    networks:
      - shopping-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - shopping-network

volumes:
  mongodb_data:

networks:
  shopping-network:
    driver: bridge